services:
  # --- Databases ---
  user-db:
    image: postgres:15
    environment:
      POSTGRES_DB: bookstore_user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bookstore_user_service_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  catalog-db:
    image: postgres:15
    environment:
      POSTGRES_DB: bookstore_catalog_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bookstore_catalog_service_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  checkout-db:
    image: postgres:15
    environment:
      POSTGRES_DB: bookstore_checkout_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"
    volumes:
      - checkout-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bookstore_checkout_service_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  notification-db:
    image: postgres:15
    environment:
      POSTGRES_DB: bookstore_notification_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5436:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bookstore_notification_service_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  audit-db:
    image: postgres:15
    environment:
      POSTGRES_DB: bookstore_audit_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5437:5432"
    volumes:
      - audit-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bookstore_audit_service_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq/mnesia
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_admin_pass
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "redis_admin_pass", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    ports:
      - "8206:8200"
    cap_add:
      - IPC_LOCK

    # --- Microservices ---
    volumes:
      - ./vault/config/vault.hcl:/vault/config/vault.hcl
      - ./vault/data:/vault/file
      - ./vault/certs:/vault/certs
    command: server
    depends_on:
      vault-cert-generator:
        condition: service_completed_successfully
  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    image: discovery-service:0.0.1-SNAPSHOT
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8761'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    image: config-server:0.0.1-SNAPSHOT
    ports:
      - "8888:8888"
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8888'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: api_gateway:0.0.1-SNAPSHOT
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    volumes:
      - ./vault/approles:/vault/approles
      - ./vault/certs:/vault/certs
  auth-server:
    build:
      context: .
      dockerfile: auth-server/Dockerfile
    image: auth-server:0.0.1-SNAPSHOT
    ports:
      - "9001:9001"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      user-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/bookstore_user_service_db
    env_file:
      - ./vault/approles/auth-server.env
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9001'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

    volumes:
      - ./vault/approles:/vault/approles
      - ./vault/certs:/vault/certs
  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    image: catalog-service:0.0.1-SNAPSHOT
    ports:
      - "8200-8205:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://catalog-db:5432/bookstore_catalog_service_db
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    env_file:
      - ./vault/approles/catalog-service.env
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8082'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

    volumes:
      - ./vault/approles:/vault/approles
      - ./vault/certs:/vault/certs
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: user-service:0.0.1-SNAPSHOT
    ports:
      - "8100-8105:8081"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
      vault-init:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/bookstore_user_service_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    env_file:
      - ./vault/approles/user-service.env
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8081'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

    volumes:
      - ./vault/approles:/vault/approles
      - ./vault/certs:/vault/certs
  checkout-service:
    build:
      context: .
      dockerfile: checkout-service/Dockerfile
    image: checkout-service:0.0.1-SNAPSHOT
    ports:
      - "8300-8305:8083"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      checkout-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://checkout-db:5432/bookstore_checkout_service_db
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    env_file:
      - ./vault/approles/checkout-service.env
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8083'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    volumes:
      - ./vault/approles:/vault/approles
      - ./vault/certs:/vault/certs
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: notification-service:0.0.1-SNAPSHOT
    ports:
      - "8400-8405:8084"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      notification-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://notification-db:5432/bookstore_notification_service_db
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8084'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

    volumes:
      - ./vault/approles:/vault/approles
      - ./vault/certs:/vault/certs
  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    image: audit-service:0.0.1-SNAPSHOT
    ports:
      - "8500-8505:8085"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_healthy
      audit-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://audit-db:5432/bookstore_audit_service_db
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8085'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

    # --- Monitoring ---
    volumes:
      - ./vault/approles:/vault/approles
      - ./vault/certs:/vault/certs
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger HTTP Thrift
      - "14250:14250" # Jaeger gRPC collector
    environment:
      # Enable OTLP receiving in Jaeger's built-in collector
      - COLLECTOR_OTLP_ENABLED=true
    restart: on-failure

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC endpoint
      - "4318:4318" # OTLP HTTP endpoint
      - "9091:9090" # Prometheus scraper target
    depends_on:
      - jaeger
      - loki
    restart: on-failure

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
    ports:
      - "9092:9090"
    depends_on:
      - otel-collector
    restart: on-failure

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    restart: on-failure

  grafana:
    image: grafana/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  alertmanager:
    image: prom/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./alertmanager/slack_url:/etc/alertmanager/slack_url
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    depends_on:
      vault:
        condition: service_started
      user-db:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      checkout-db:
        condition: service_healthy
      notification-db:
        condition: service_healthy
      audit-db:
        condition: service_healthy
    volumes:
      - ./vault/data:/vault/data
      - ./vault/approles:/vault/approles
      - ./vault/init/vault-init.sh:/tmp/vault-init.sh
      - ./vault/certs:/vault/certs
    command: sh -c "apk add --no-cache jq netcat-openbsd && sh /tmp/vault-init.sh"
    environment:
      - VAULT_ADDR=https://vault:8200
      - VAULT_SKIP_VERIFY=true
  vault-cert-generator:
    image: alpine
    container_name: vault-cert-generator
    volumes:
      - ./vault/certs:/vault/certs
    command: sh -c "apk add --no-cache openssl && mkdir -p /vault/certs && if [ ! -f /vault/certs/vault.crt ] || ! openssl x509 -in /vault/certs/vault.crt -noout -text | grep -q 'DNS:vault'; then openssl req -new -newkey rsa:2048 -days 365 -nodes -x509 -subj \"/C=US/ST=State/L=City/O=Organization/CN=vault\" -addext \"subjectAltName=DNS:vault,DNS:localhost,IP:127.0.0.1\" -keyout /vault/certs/vault.key -out /vault/certs/vault.crt && openssl pkcs12 -export -in /vault/certs/vault.crt -inkey /vault/certs/vault.key -out /vault/certs/vault.truststore.p12 -name vault -passout pass:changeit; fi; chmod 644 /vault/certs/vault.key; chmod 644 /vault/certs/vault.crt; chmod 640 /vault/certs/vault.truststore.p12"
volumes:
  user-db-data:
  catalog-db-data:
  checkout-db-data:
  rabbitmq-data:
  loki-data:
  notification-db-data:
  audit-db-data:
